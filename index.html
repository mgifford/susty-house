<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Assess and improve your home's sustainability with a guided, structured evaluation.">
  <title>Sustainable House Evaluator</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="src/css/main.css">
  <link rel="stylesheet" href="src/css/print.css" media="print">
  <link rel="stylesheet" href="src/css/overrides.css">
  <link rel="icon" href="src/icons/icon-192.png" type="image/png">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="app-header" role="banner">
    <div class="header-inner">
      <span class="app-title">🏡 Sustainable House Evaluator</span>
      <div id="score-badge" class="score-badge" role="status" aria-live="polite" aria-atomic="true" aria-label="Current sustainability score" hidden>
        <span class="score-value">0</span>
        <span class="score-label">/100</span>
      </div>
    </div>
  </header>

  <div id="app-status" class="visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>

  <main id="main-content" tabindex="-1">
    <section id="view-loading" class="view" aria-label="Loading">
      <div class="loading-spinner" role="status" aria-label="Loading application…">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading…</p>
      </div>
    </section>

    <section id="view-home" class="view" aria-label="Home — your assessments" hidden></section>

    <section id="view-profile" class="view" aria-label="House profile" hidden></section>

    <section id="view-assessment" class="view" aria-label="Sustainability assessment" hidden></section>

    <section id="view-results" class="view" aria-label="Assessment results" hidden></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
